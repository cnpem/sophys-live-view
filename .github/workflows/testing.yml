on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    name: Run existing tests
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - qt-version: 5
            python-version: "3.10"
          - qt-version: 5
            python-version: "3.11"
          - qt-version: 6
            python-version: "3.12"
          - qt-version: 6
            python-version: "3.13"
          - qt-version: 6
            python-version: "3.14"
    steps:
      - name: Setup system
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxcb-cursor0
      - uses: actions/checkout@v4
      - name: Setup environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: tests/test_environment_qt${{ matrix.qt-version }}_python${{ matrix.python-version }}.yml
      - name: Install package
        run: pip install ".[all]" && pip install pytest-xvfb
        shell: micromamba-shell {0}
      - name: Run pytest
        run: |
          export PYTHONFAULTHANDLER=1
          pytest -vvv -s --xvfb-backend xvfb
        shell: micromamba-shell {0}
